<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kane's Calc</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #1a1a1a; --text: #ffffff; --accent: #f39c12; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calc-body { width: 90%; max-width: 350px; background: #333; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #display { width: 100%; height: 60px; font-size: 2rem; text-align: right; margin-bottom: 20px; background: #222; border: none; color: white; padding: 10px; box-sizing: border-box; border-radius: 10px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 1.2rem; border: none; border-radius: 10px; background: #444; color: white; cursor: pointer; }
        button:active { background: #555; }
        .operator { background: var(--accent); }
        .equal { background: #27ae60; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="display" disabled placeholder="0">
    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="appendToDisplay('/')" class="operator">÷</button>
        <button onclick="appendToDisplay('*')" class="operator">×</button>
        <button onclick="backspace()">⌫</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('-')" class="operator">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('+')" class="operator">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>
        
        <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendToDisplay(input) { display.value += input; }
    function clearDisplay() { display.value = ''; }
    function backspace() { display.value = display.value.slice(0, -1); }
    
    function calculate() {
        try {
            // Using a simple Function constructor for basic math evaluation
            display.value = Function('"use strict";return (' + display.value + ')')();
        } catch (error) {
            display.value = "Error";
            setTimeout(clearDisplay, 1500);
        }
    }

    // Registering the Service Worker (Task 3)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
